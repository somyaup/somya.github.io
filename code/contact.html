<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Somya Upadhyay</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            color:white;
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }

        header{
            padding:20px 8%;
        }

        nav ul{
            display:flex;
            justify-content:flex-end;
            gap:30px;
            list-style:none;
            flex-wrap:wrap;
        }

        nav a{
            color:white;
            text-decoration:none;
            transition:0.3s ease;
            opacity:0.85;
        }

        nav a:hover{
            color:#38bdf8;
            opacity:1;
        }

        .active{
            color:#38bdf8;
            font-weight:600;
        }

        main{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:50px 8%;
        }

        .contact-card{
            width:100%;
            max-width:700px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:24px;
            padding:45px;
            backdrop-filter: blur(10px);
        }

        h1{
            font-size:clamp(2.5rem, 5vw, 4rem);
            margin-bottom:12px;
        }

        .subtitle{
            color:#cbd5e1;
            margin-bottom:40px;
            line-height:1.7;
        }

        .contact-section{
            margin-bottom:35px;
        }

        .contact-section h2{
            color:#38bdf8;
            margin-bottom:14px;
            font-size:1.2rem;
        }

        .contact-section p,
        .contact-section a{
            color:#e2e8f0;
            line-height:1.8;
            text-decoration:none;
        }

        .contact-section a:hover{
            color:#38bdf8;
        }

        .email-button{
            display:inline-block;
            margin-top:12px;
            padding:14px 24px;
            background:#38bdf8;
            color:#0f172a !important;
            border-radius:10px;
            font-weight:700;
            transition:0.3s ease;
        }

        .email-button:hover{
            background:#0ea5e9;
            transform:translateY(-2px);
        }

        .social-links{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
            margin-top:10px;
        }

        footer{
            text-align:center;
            padding:20px;
            color:#cbd5e1;
            font-size:0.9rem;
        }

        @media(max-width:768px){

            nav ul{
                justify-content:center;
                gap:18px;
            }

            .contact-card{
                padding:30px;
            }
        }

    </style>
</head>
